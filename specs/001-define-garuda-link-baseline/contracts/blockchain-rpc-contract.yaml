## 2. Smart Contract: HarvestTokenRegistry

**File**: `blockchain-contracts/contracts/HarvestTokenRegistry.sol`  
**Solidity Version**: 0.8.24  
**Deploy Address**: Dikonfigurasi via env `HARVEST_TOKEN_CONTRACT_ADDRESS`

### 2.1 State Variables

```solidity
// Mapping tokenId → HarvestToken struct
mapping(uint256 => HarvestToken) public tokens;

// Anti-duplikasi batch_id (Edge Case spec)
mapping(string => bool) public batchIdExists;

// Counter untuk auto-increment tokenId
uint256 public tokenCounter;

// Owner/admin address (deployer)
address public owner;
```

### 2.2 Struct: HarvestToken

```solidity
struct HarvestToken {
    uint256 tokenId;
    string  batchId;              // Mirror batch_id dari PostgreSQL
    address farmerAddress;        // Wallet address petani (PoC: managed keypair)
    string  commodityCode;        // "CABAI_RAWIT" | "BAWANG_MERAH" | "JAGUNG"
    uint256 harvestQtyGrams;      // Quantity dalam gram (presisi integer)
    uint256 referencePriceWei;    // Harga referensi dalam wei-equivalent unit
    TokenStatus status;
    string  correlationId;        // NFR-004: traceability string "GARUDA-{uuid4}"
    uint256 mintedAt;             // Unix timestamp
    uint256 updatedAt;            // Unix timestamp
}
```

### 2.3 Enum: TokenStatus

```solidity
enum TokenStatus {
    Draft,               // 0 — token dibuat, belum diverifikasi
    PendingVerification, // 1 — dikirim ke Bank Mitra untuk verifikasi
    Verified,            // 2 — Bank Mitra menyatakan valid
    Collateralized,      // 3 — digunakan sebagai jaminan aktif
    Released,            // 4 — jaminan dilepas pasca lunas
    Rejected             // 5 — ditolak verifikasi/pembiayaan
}
```

