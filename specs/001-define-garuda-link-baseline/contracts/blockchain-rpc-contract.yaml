## 5. Error Handling — NFR-003

| Kondisi | Solidity revert reason | HTTP di backend-api |
|---|---|---|
| batchId sudah ada | `"HarvestToken: duplicate batchId"` | 409 `TOKEN_DUPLICATE` |
| tokenId tidak ditemukan | `"HarvestToken: token not found"` | 404 `NOT_FOUND` |
| Transisi status ilegal | `"HarvestToken: invalid state transition"` | 400 `INVALID_REQUEST` |
| Caller bukan owner | `"HarvestToken: caller is not owner"` | 403 `FORBIDDEN` |
| Besu node tidak tersedia | (ethers.js timeout/connection error) | 503 `BESU_NODE_UNAVAILABLE` |

Saat `BESU_NODE_UNAVAILABLE`:
- Token status di PostgreSQL diset ke `pending_verification` dengan flag `blockchain_sync_pending=true`
- AuditTrail dicatat dengan `status_after='PENDING_BLOCKCHAIN_SYNC'`
- Retry mechanism via scheduled task (tidak termasuk scope PoC — dicatat sebagai TODO)

