### 3.3 getToken — AC-BNK-01

**Deskripsi**: Membaca data token dari blockchain. View function (tidak perlu gas, tidak ada tx).

**Solidity signature**:
```solidity
function getToken(uint256 tokenId)
    external view
    returns (HarvestToken memory)
```

**ethers.js call (backend-api)**:
```javascript
const token = await contract.getToken(tokenId);
// token.status adalah number 0–5 → map ke string di application layer
```

