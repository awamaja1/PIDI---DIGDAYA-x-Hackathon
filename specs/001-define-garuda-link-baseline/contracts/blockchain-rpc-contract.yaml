## 6. Deployment dan Konfigurasi

### Deploy ke local Besu

```bash
cd blockchain-contracts
npx hardhat run scripts/deploy.js --network besu-local
# Output: Contract deployed at: 0x...
# Simpan address ke .env: HARVEST_TOKEN_CONTRACT_ADDRESS=0x...
```

### Konfigurasi network di hardhat.config.js

```javascript
networks: {
  'besu-local': {
    url: process.env.BESU_RPC_URL || 'http://localhost:8545',
    chainId: 1337,
    accounts: [process.env.DEPLOYER_PRIVATE_KEY],
    gas: 'auto',
    gasPrice: 'auto',
    timeout: 60000  // 60s untuk menghindari timeout saat boot
  }
}
```

### Environment Variables (backend-api)

```
BESU_RPC_URL=http://besu-node1:8545
HARVEST_TOKEN_CONTRACT_ADDRESS=0x...
DEPLOYER_PRIVATE_KEY=0x...   # Managed keypair untuk PoC, bukan wallet pengguna nyata
```

---

## 7. Catatan Keamanan PoC

- Private key deployer HANYA untuk PoC — jangan gunakan wallet dengan aset nyata
- Tidak ada access control multi-role pada smart contract untuk PoC (hanya owner)
- Kontrak belum diaudit keamanan — tidak untuk produksi
- Chain ID 1337 adalah standard lokal dev, tidak bisa replay ke mainnet/testnet publik
