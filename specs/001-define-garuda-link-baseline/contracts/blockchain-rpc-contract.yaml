## 4. Events — Untuk Indexing dan Audit (AC-REG-02)

### 4.1 TokenMinted

```solidity
event TokenMinted(
    uint256 indexed tokenId,
    string  indexed batchId,
    address indexed farmerAddress,
    string          commodityCode,
    uint256         harvestQtyGrams,
    string          correlationId,
    uint256         timestamp
);
```

### 4.2 StatusUpdated

```solidity
event StatusUpdated(
    uint256 indexed     tokenId,
    TokenStatus         oldStatus,
    TokenStatus         newStatus,
    string              correlationId,
    uint256             timestamp
);
```

**Cara listen event di backend-api (ethers.js)**:
```javascript
contract.on("TokenMinted", (tokenId, batchId, farmerAddress, commodityCode, qty, corrId, ts) => {
  // Update PostgreSQL harvest_assets dengan token_id dan besu_tx_hash
  auditService.log({ module: 'blockchain', action: 'TOKEN_MINTED', correlationId: corrId, ... });
});
```

