## 3. Function Contracts

### 3.1 mintToken — FR-004, AC-PET-03

**Deskripsi**: Membuat token baru untuk batch panen. Menolak duplikasi `batchId`.

**Solidity signature**:
```solidity
function mintToken(
    string  calldata batchId,
    address          farmerAddress,
    string  calldata commodityCode,
    uint256          harvestQtyGrams,
    uint256          referencePriceWei,
    string  calldata correlationId
) external returns (uint256 tokenId)
```

**Validasi on-chain**:
```solidity
require(!batchIdExists[batchId], "HarvestToken: duplicate batchId");
require(bytes(batchId).length > 0, "HarvestToken: batchId empty");
require(harvestQtyGrams > 0, "HarvestToken: quantity must be positive");
require(bytes(correlationId).length > 0, "HarvestToken: correlationId required");
```

**ethers.js call (backend-api)**:
```javascript
// backend-api/src/services/besuClient.js
const tx = await contract.mintToken(
  batchId,
  farmerAddress,
  commodityCode,
  BigInt(harvestQtyGrams * 1000),  // kg → gram conversion
  BigInt(referencePriceIdr),
  correlationId
);
const receipt = await tx.wait(1);  // Tunggu 1 konfirmasi (QBFT finality ~2s)
const tokenId = receipt.logs[0].args.tokenId;  // dari event TokenMinted
```

**Return / Output**:
- `tokenId`: `uint256` — ID token baru (auto-increment)  
- Event emitted: `TokenMinted`

