### 3.2 updateStatus — AC-BNK-03

**Deskripsi**: Memperbarui status token. Hanya boleh dipanggil oleh `owner` (backend-api wallet).

**Solidity signature**:
```solidity
function updateStatus(
    uint256          tokenId,
    TokenStatus      newStatus,
    string  calldata correlationId
) external onlyOwner
```

**Validasi on-chain**:
```solidity
require(tokens[tokenId].tokenId != 0, "HarvestToken: token not found");
require(isValidTransition(tokens[tokenId].status, newStatus), "HarvestToken: invalid state transition");
```

**State Transition Rules**:

| Status Sumber | Status Tujuan yang Diizinkan |
|---|---|
| Draft | PendingVerification |
| PendingVerification | Verified, Rejected |
| Verified | Collateralized, Rejected |
| Collateralized | Released |
| Released | (terminal — tidak ada transisi) |
| Rejected | (terminal — tidak ada transisi) |

**ethers.js call (backend-api)**:
```javascript
const tx = await contract.updateStatus(
  tokenId,
  newStatusEnum,  // 0–5 sesuai enum TokenStatus
  correlationId
);
await tx.wait(1);
```

