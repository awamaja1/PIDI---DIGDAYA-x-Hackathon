# GARUDA-LINK Blockchain RPC Contract

**Versi**: v1 | **Tanggal**: 2026-03-17  
**Referensi Requirements**: FR-004, AC-BNK-01, AC-BNK-03, HA-001..003

Dokumen ini mendefinisikan kontrak antarmuka antara backend-api (Node.js/ethers.js)
dan smart contract `HarvestTokenRegistry` yang di-deploy di Hyperledger Besu QBFT.

**Penting**: Kontrak ini HANYA boleh diakses oleh backend-api. ai-engine TIDAK BOLEH
memanggil JSON-RPC Besu secara langsung (HA-003 — violation arsitektur).

---

## 1. Jaringan dan Koneksi

| Parameter | Nilai |
|---|---|
| Network Name | GARUDA-LOCAL |
| Chain ID | 1337 |
| JSON-RPC Endpoint | `http://besu-node1:8545` (Docker internal) / `http://localhost:8545` (host) |
| Consensus | QBFT (4-node, blockperiodseconds: 2) |
| Finality | ~2 detik (1 blok) |
| Toolchain | Hardhat 2.22 + ethers.js 6 |

